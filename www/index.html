<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuitarSim - 吉他模拟器</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-guitar"></i>
                <span>GUITAR SIMULATOR</span>
            </div>
            <div class="header-controls">
                <button id="helpBtn" class="icon-btn" title="帮助">
                    <i class="fas fa-question-circle"></i>
                </button>
            </div>
        </header>

        <!-- Control Bar -->
        <section class="control-bar">
            <div class="control-group">
                <label>音色</label>
                <select id="toneSelect">
                    <option value="nylon">古典吉他 (Nylon)</option>
                    <option value="steel">民谣吉他 (Steel)</option>
                    <option value="electric">电吉他</option>
                    <option value="synth">合成器</option>
                </select>
            </div>
            <div class="control-group">
                <label>音量</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
                <span id="volumeValue">70%</span>
            </div>
            <div class="control-group">
                <label>MIDI音色库</label>
                <button id="loadSoundfontBtn" class="btn">
                    <i class="fas fa-folder-open"></i> 加载音色库
                </button>
                <input type="file" id="soundfontInput" accept=".sf2,.gig,.ogg" style="display:none">
            </div>
            <div class="control-group soundfont-info" id="soundfontInfo" style="display:none">
                <span id="soundfontName"></span>
            </div>
            <div class="control-group">
                <label>音色</label>
                <select id="instrumentSelect" disabled>
                    <option value="">先加载音色库</option>
                </select>
            </div>
        </section>

        <!-- Fretboard Area -->
        <section class="fretboard-section">
            <div class="fretboard-container" id="fretboardContainer">
                <div class="fretboard" id="fretboard">
                    <!-- Fretboard generated by JavaScript -->
                </div>
            </div>
            <div class="fretboard-info">
                <span id="noteDisplay">点击品位弹奏</span>
            </div>
        </section>

        <!-- Recording Controls -->
        <section class="recorder-section">
            <div class="recorder-controls">
                <button id="recordBtn" class="btn record-btn">
                    <i class="fas fa-microphone"></i> 录音
                </button>
                <button id="playBtn" class="btn" disabled>
                    <i class="fas fa-play"></i> 播放
                </button>
                <button id="stopBtn" class="btn" disabled>
                    <i class="fas fa-stop"></i> 停止
                </button>
                <button id="exportBtn" class="btn" disabled>
                    <i class="fas fa-download"></i> 导出
                </button>
            </div>
            <div class="recorder-status">
                <div class="waveform-container" id="waveformContainer">
                    <canvas id="waveformCanvas"></canvas>
                </div>
                <span id="recorderStatus">准备就绪</span>
                <span id="recorderTime">00:00</span>
            </div>
        </section>
    </div>

    <!-- Help Modal -->
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>使用帮助</h2>
                <button class="modal-close" id="closeHelpBtn">&times;</button>
            </div>
            <div class="modal-body">
                <h3>基本操作</h3>
                <ul>
                    <li>点击指板上的品位即可弹奏对应音符</li>
                    <li>使用音量滑块调节音量大小</li>
                    <li>从下拉菜单选择不同吉他音色</li>
                </ul>
                <h3>录音功能</h3>
                <ul>
                    <li>点击录音按钮开始录制您的弹奏</li>
                    <li>录音完成后可点击播放回放</li>
                    <li>导出按钮可将录音保存为音频文件</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="spessasynth_bundle.js"></script>
    <script>
        // Wait for SpessaSynth to be ready
        window.addEventListener('load', () => {
            if (typeof SpessaSynth !== 'undefined') {
                window.WorkletSynthesizer = SpessaSynth.WorkletSynthesizer;
                console.log('SpessaSynth loaded from bundle');
                window.dispatchEvent(new Event('spessasynthReady'));
            }
        });
    </script>
    <script src="js/audio.js"></script>
    <script src="js/fretboard.js"></script>
    <script src="js/recorder.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
